name: Sync to Hugging Face hub
on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  sync-to-hub:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true
      - name: Push to hub
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
        run: |
          # 본인의 유저네임과 스페이스 이름으로 수정하세요!
          git push --force https://ashfortune:$HF_TOKEN@huggingface.co/spaces/ashfortune/communiKate main